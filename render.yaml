services:
  - type: web
    name: web3ssh-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn gemini_analyzer:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
    healthCheckPath: /health
    rootDir: smart-contract-UI/backend
